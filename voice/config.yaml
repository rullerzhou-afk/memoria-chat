# Memoria Voice Service Configuration

# --- Audio (Step 1) ---
sample_rate: 16000
channels: 1

# --- Server connection ---
memoria_url: "http://127.0.0.1:3000"
# NOTE: Use ADMIN_TOKEN env var for secrets. Never put real tokens in this file.

# --- VAD (Step 2) ---
vad_threshold: 0.5
silence_duration: 1.5    # 秒，静音多久算说完
max_recording: 60        # 秒，录音上限

# --- STT / Session (Step 3) ---
language: "auto"
stt_provider: "local"    # "local"=faster-whisper, "local-torch"=openai-whisper+PyTorch(AMD GPU), "api"=服务端
stt_model: "small"       # Whisper 模型: tiny/base/small/medium/large-v3
session_timeout: 30      # 分钟，超时新建对话
idle_remind_m: 2         # 分钟，空闲多久提醒（0=禁用）
idle_remind_wait_s: 15   # 秒，提醒后等待多久进入休眠

# --- TTS (Step 4) ---
tts_voice: "alloy"          # alloy/ash/ballad/coral/echo/fable/nova/onyx/sage/shimmer/verse
tts_speed: 1.0              # 0.25~4.0

# --- Wake Word (Step 5) ---
trigger_mode: "keypress"     # "keypress"=Space only, "wakeword"=voice only, "both"=Space+voice
wake_word: "小莫小莫,hey memoria"          # 唤醒词（多个用逗号分隔）
wake_threshold: 0.25          # 检测阈值，越大越难触发（0.1~0.9）
wake_score: 1.5              # 关键词增强分数，越大越容易通过 beam search
